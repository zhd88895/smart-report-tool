<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 320" font-family="Segoe UI, Microsoft YaHei, sans-serif">
  <defs>
    <linearGradient id="gFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="100%" stop-color="#764ba2"/>
    </linearGradient>
    <linearGradient id="gBack" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#11998e"/>
      <stop offset="100%" stop-color="#38ef7d"/>
    </linearGradient>
    <linearGradient id="gPy" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f093fb"/>
      <stop offset="100%" stop-color="#f5576c"/>
    </linearGradient>
    <linearGradient id="gStore" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#4facfe"/>
      <stop offset="100%" stop-color="#00f2fe"/>
    </linearGradient>
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="115%">
      <feDropShadow dx="1" dy="3" stdDeviation="4" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="840" height="320" rx="12" fill="#f8f9fc"/>

  <!-- Frontend Box -->
  <rect x="30" y="30" width="220" height="140" rx="12" fill="url(#gFront)" filter="url(#shadow)"/>
  <text x="140" y="65" text-anchor="middle" fill="white" font-size="18" font-weight="bold">前端</text>
  <text x="140" y="88" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">React + Vite + TypeScript</text>
  <text x="140" y="112" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">Tailwind CSS + shadcn/ui</text>
  <text x="140" y="140" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10" font-family="Consolas,monospace">localhost:5173</text>
  <rect x="80" y="150" width="120" height="18" rx="9" fill="rgba(255,255,255,0.2)"/>
  <text x="140" y="163" text-anchor="middle" fill="white" font-size="10">Zustand + IndexedDB</text>

  <!-- Backend Box -->
  <rect x="310" y="30" width="230" height="140" rx="12" fill="url(#gBack)" filter="url(#shadow)"/>
  <text x="425" y="65" text-anchor="middle" fill="white" font-size="18" font-weight="bold">后端</text>
  <text x="425" y="88" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">Node.js (纯内置模块, 零依赖)</text>
  <text x="425" y="112" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">child_process.spawn</text>
  <text x="425" y="140" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10" font-family="Consolas,monospace">localhost:3001</text>
  <rect x="380" y="150" width="90" height="18" rx="9" fill="rgba(255,255,255,0.2)"/>
  <text x="425" y="163" text-anchor="middle" fill="white" font-size="10">SSE 日志推送</text>

  <!-- Python Box -->
  <rect x="600" y="30" width="210" height="140" rx="12" fill="url(#gPy)" filter="url(#shadow)"/>
  <text x="705" y="65" text-anchor="middle" fill="white" font-size="18" font-weight="bold">Python 虚拟环境</text>
  <text x="705" y="92" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">venv + pip</text>
  <text x="705" y="116" text-anchor="middle" fill="rgba(255,255,255,0.9)" font-size="11">python-docx · pandas · lxml</text>
  <text x="705" y="140" text-anchor="middle" fill="rgba(255,255,255,0.7)" font-size="10">巡检脚本运行</text>
  <rect x="645" y="150" width="120" height="18" rx="9" fill="rgba(255,255,255,0.2)"/>
  <text x="705" y="163" text-anchor="middle" fill="white" font-size="10">自动依赖检查安装</text>

  <!-- Arrows: Frontend ↔ Backend -->
  <line x1="250" y1="90" x2="310" y2="90" stroke="#667eea" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="310,85 310,95 318,90" fill="#667eea"/>
  <line x1="310" y1="105" x2="250" y2="105" stroke="#11998e" stroke-width="2.5" stroke-dasharray="6,3"/>
  <polygon points="250,100 250,110 242,105" fill="#11998e"/>
  <rect x="252" y="72" width="56" height="16" rx="4" fill="#667eea" opacity="0.85"/>
  <text x="280" y="83" text-anchor="middle" fill="white" font-size="9" font-weight="bold">HTTP</text>
  <rect x="252" y="112" width="56" height="16" rx="4" fill="#11998e" opacity="0.85"/>
  <text x="280" y="123" text-anchor="middle" fill="white" font-size="9" font-weight="bold">SSE</text>

  <!-- Arrow: Backend → Python -->
  <line x1="540" y1="90" x2="600" y2="90" stroke="#38ef7d" stroke-width="2.5"/>
  <polygon points="600,84 600,96 608,90" fill="#38ef7d"/>
  <rect x="545" y="72" width="50" height="16" rx="4" fill="#11998e" opacity="0.85"/>
  <text x="570" y="83" text-anchor="middle" fill="white" font-size="9" font-weight="bold">spawn</text>

  <!-- Storage Box (below Backend) -->
  <rect x="310" y="200" width="500" height="95" rx="12" fill="url(#gStore)" filter="url(#shadow)"/>
  <text x="560" y="228" text-anchor="middle" fill="white" font-size="16" font-weight="bold">本地文件存储</text>
  <line x1="360" y1="240" x2="760" y2="240" stroke="rgba(255,255,255,0.3)" stroke-width="1"/>

  <!-- Storage Sub-boxes -->
  <rect x="330" y="248" width="108" height="35" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="384" y="270" text-anchor="middle" fill="white" font-size="11">scripts/</text>

  <rect x="448" y="248" width="108" height="35" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="502" y="270" text-anchor="middle" fill="white" font-size="11">uploads/</text>

  <rect x="566" y="248" width="108" height="35" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="620" y="270" text-anchor="middle" fill="white" font-size="11">templates/</text>

  <rect x="684" y="248" width="108" height="35" rx="6" fill="rgba(255,255,255,0.2)"/>
  <text x="738" y="270" text-anchor="middle" fill="white" font-size="11">reports/</text>

  <!-- Arrow: Backend ↓ Storage -->
  <line x1="425" y1="170" x2="425" y2="200" stroke="#4facfe" stroke-width="2.5"/>
  <polygon points="419,200 431,200 425,208" fill="#4facfe"/>
</svg>
